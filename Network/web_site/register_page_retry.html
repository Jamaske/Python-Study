<!DOCTYPE html>
<html>

<head>
    <title>Пример формы CGI</title>
    <style>
        .form-group {
            display: flex;
            align-items: center;
        }

        .form-group label {
            width: 100px;
            /* Adjust as needed */
            text-align: right;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <h2>Enter credentials:</h2>
    <form action="/web_site/register_page.py" method="post">
        <div class="form-group">
            <label for="login">login:</label>
            <input type="text" id="login" name="login">
        </div>

        <div class="form-group">
            <label for="password">password:</label>
            <input type="text" id="password" name="password">
        </div>

        <br>
        <input type="submit" value="Отправить">
        Wrong password
    </form>
</body>

</html>
